                .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:30px; }

                .map-wrapper { height: 450px; width: 100%; border: 1px solid var(--gold); filter: grayscale(1) invert(0.92) contrast(1.2); }
                .address-footer { 
                    background: var(--surface); padding: 50px 7%; text-align: center; 
                    border-bottom: 4px solid var(--gold);

                .wa-float { 
                    position:fixed; bottom:30px; right:30px; background:#25d366; 
                    width:70px; height:70px; border-radius:50%; display:flex; 
                    align-items:center; justify-content:center; color:#FFF !important; 
                    font-size:35px; animation: pulse 2s infinite; z-index:9999; 
                    text-decoration:none !important; box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
                }
                @keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(37,211,102,0.7); } 70% { box-shadow:0 0 0 25px rgba(37,211,102,0); } 100% { box-shadow:0 0 0 0 rgba(37,211,102,0); } }

                footer { padding:60px; text-align:center; background:#050505; border-top:1px solid #111; color: #555; }
                footer a { color:var(--gold) !important; text-decoration:none !important; font-weight:800; transition: 0.3s; }
                footer a:hover { color: #FFF !important; }

                @media (max-width: 992px) {
                    .menu-toggle { display: block; }
                    .nav-menu { 
                        display: none; position: absolute; top: 85px; left: 0; width: 100%; 
                        background: #0F0F0F; padding: 40px 0; flex-direction: column; 
                        text-align: center; border-bottom: 2px solid var(--gold); gap: 25px;
                    }
                    .nav-menu.active { display: flex; }
                }
            </style>

            <header>

                <nav class="nav-menu" id="nav-menu">
                    <a href="#" onclick="toggleMenu()">Início</a>
                    <a href="#servicos" onclick="toggleMenu()">Serviços</a>

            </header>

            <div class="hero">
                <h1>MODERN TRADITION</h1>
                <p>A excelência em barbearia clássica. Onde cada corte é um legado e cada detalhe é uma obra de arte.</p>
                <a href="https://wa.me/5551991345607" class="btn-cta">Agendar Agora</a>
            </div>

            <section class="section" id="servicos">
                <div class="section-title">
                    <h2>NOSSOS SERVIÇOS</h2>

                </div>

                    <div class="card">

                </div>
                <div class="address-footer">
                    <h3>VISITE NOSSA SEDE</h3>
                    <p>AV. ASSIS BRASIL, 7500 — SARANDI, PORTO ALEGRE - RS</p>
                    <p style="margin-top: 10px; color: var(--gold); font-weight: 700;">SEG A SÁB: 09H ÀS 20H</p>
                </div>
            </section>

            <footer>
                <p>© 2026 HERITAGE BARBER — TODOS OS DIREITOS RESERVADOS</p>
                <p style="margin-top: 15px;">DESENVOLVIDO POR <a href="https://jmswebsolutions.github.io/" target="_blank">JMS WEB SOLUTIONS</a></p>
            </footer>

            <a href="https://wa.me/5551991345607" class="wa-float" target="_blank" title="Fale Conosco">
                <i class="fab fa-whatsapp"></i>
            </a>
        `;
        
        window.toggleMenu = function() {
            document.getElementById('nav-menu').classList.toggle('active');
        };

        window.onload = () => {
            const app = document.getElementById('app');
            const loader = document.getElementById('loader');
            setTimeout(() => {
                app.innerHTML = _0xLAYOUT;
                loader.style.display = 'none';
                app.style.opacity = '1';
                document.body.style.overflowY = 'auto'; 
            }, 1200);
        };

        
        document.onkeydown = function(e) {
            
            if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83 || e.keyCode == 67 || e.keyCode == 73 || e.keyCode == 74))) {
                return false;
            }
        };
    </script>
</body>
</html>
