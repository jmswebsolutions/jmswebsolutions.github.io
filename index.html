  if(o&&!_dt){_dt=true;document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f1115;color:#ff5e14;font-family:sans-serif;font-size:1.5rem;">Acesso restrito.</div>';}
  if(!o)_dt=false;
},600);
setTimeout(function(){
  var h=document.getElementById("hbg"),n=document.getElementById("nmn");
  if(h&&n){
    h.addEventListener("click",function(){h.classList.toggle("active");n.classList.toggle("active");});
    document.querySelectorAll(".nav-menu a").forEach(function(l){l.addEventListener("click",function(){h.classList.remove("active");n.classList.remove("active");});});
  }
  var io=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});},{threshold:0.10,rootMargin:"0px 0px -50px 0px"});
  document.querySelectorAll(".rv").forEach(function(el){io.observe(el);});
  var ih=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");ih.unobserve(e.target);}});},{threshold:0.3});
  document.querySelectorAll(".section-header").forEach(function(el){ih.observe(el);});
},60);
})();</script>
